name: Sincronizar Earth Engine

on:
  push:
    branches: [ main ]
  schedule:
    # Se ejecuta automáticamente todos los días a la medianoche
    - cron: '0 0 * * *'
  workflow_dispatch: # Te permite activar la copia manualmente cuando quieras

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio de GitHub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Traer scripts de Earth Engine
        run: |
          # Añade el repositorio de Google Earth Engine que se ve en tu imagen
          git remote add earthengine https://googlesource.com
          
          # Descarga los archivos de Google y los mezcla en GitHub
          git fetch earthengine
          git merge earthengine/master --allow-unrelated-histories -m "Sincronización automática de Earth Engine"
          
          # Sube los cambios finales a tu GitHub
          git push origin main
